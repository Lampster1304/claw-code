<h2>Elige el verde lumínico</h2>
<p class="subtitle">Comparación de tono para el acento principal del CLI</p>

<div class="cards">
  <div class="card" data-choice="a" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="height:80px;border-radius:8px;background:#39FF14;"></div>
    </div>
    <div class="card-body">
      <h3>A · Neon Lime</h3>
      <p>#39FF14 — muy brillante y clásico “luminous green”.</p>
    </div>
  </div>

  <div class="card" data-choice="b" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="height:80px;border-radius:8px;background:#00FF66;"></div>
    </div>
    <div class="card-body">
      <h3>B · Electric Green</h3>
      <p>#00FF66 — brillante pero más equilibrado para lectura.</p>
    </div>
  </div>

  <div class="card" data-choice="c" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="height:80px;border-radius:8px;background:#00FF99;"></div>
    </div>
    <div class="card-body">
      <h3>C · Aqua Lime</h3>
      <p>#00FF99 — verde luminoso con ligero matiz cian.</p>
    </div>
  </div>
</div>
